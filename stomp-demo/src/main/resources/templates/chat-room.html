<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${room.name} - STOMP Demo|">Chat Room</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 24px;
            background: #f5f5f5;
            color: #222;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            display: grid;
            gap: 16px;
        }

        section {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }

        #messages {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 10px;
            min-height: 320px;
        }

        #messages li {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            background: #fafafa;
        }

        form {
            display: grid;
            gap: 12px;
        }

        input, button {
            padding: 10px 12px;
            font-size: 14px;
        }

        .meta {
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
<main>
    <section>
        <h1 th:text="${room.name}">Chat Room</h1>
        <p th:text="|사용자: ${username}|"></p>
        <a href="/">채팅방 나가기</a>
    </section>

    <section>
        <ul id="messages"></ul>
    </section>

    <section>
        <form id="message-form">
            <input id="message-input" type="text" maxlength="500" placeholder="메시지를 입력하세요." required>
            <button type="submit">전송</button>
        </form>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
<script th:inline="javascript">
    window.chatRoomConfig = {
        roomId: [[${room.id}]],
        roomName: [[${room.name}]],
        username: [[${username}]]
    };
</script>
<script src="/js/chat.js"></script>
</body>
</html>
