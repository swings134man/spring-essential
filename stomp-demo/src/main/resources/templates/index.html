<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOMP Demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 24px;
            background: #f5f5f5;
            color: #222;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
        }

        section {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        h1, h2 {
            margin-top: 0;
        }

        form, .room-list {
            display: grid;
            gap: 12px;
        }

        .room-card {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 16px;
            background: #fafafa;
        }

        label {
            display: grid;
            gap: 6px;
        }

        input, button {
            padding: 10px 12px;
            font-size: 14px;
        }

        button {
            cursor: pointer;
        }

        .error {
            color: #b00020;
        }
    </style>
</head>
<body>
<main>
    <section>
        <h1>STOMP Chat Demo</h1>
        <p>채팅방을 생성하고 사용자 이름으로 입장할 수 있습니다.</p>
        <p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
    </section>

    <section>
        <h2>채팅방 생성</h2>
        <form id="create-room-form">
            <label for="room-name">
                채팅방 이름
                <input id="room-name" name="roomName" type="text" maxlength="50" required>
            </label>
            <label for="creator-name">
                개설자 이름
                <input id="creator-name" name="creatorName" type="text" maxlength="30" required>
            </label>
            <button type="submit">생성</button>
        </form>
    </section>

    <section>
        <h2>채팅방 목록</h2>
        <div id="room-list" class="room-list">
            <div th:if="${#lists.isEmpty(rooms)}">생성된 채팅방이 없습니다.</div>
            <div class="room-card" th:each="room : ${rooms}" th:attr="data-room-id=${room.id},data-room-name=${room.name}">
                <strong th:text="${room.name}"></strong>
                <div th:text="|Room ID: ${room.id}|"></div>
                <div th:text="|개설자: ${room.creatorName}|"></div>
                <form class="enter-room-form">
                    <label>
                        사용자 이름
                        <input name="username" type="text" maxlength="30" required>
                    </label>
                    <button type="submit">입장</button>
                </form>
                <form class="delete-room-form">
                    <label>
                        삭제 요청자 이름
                        <input name="requesterName" type="text" maxlength="30" required>
                    </label>
                    <button type="submit">삭제</button>
                </form>
            </div>
        </div>
    </section>
</main>

<script src="/js/room.js"></script>
</body>
</html>
